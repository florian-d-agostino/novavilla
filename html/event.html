<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VillaNova - Événements</title>

    <link rel="stylesheet" href="../sass/style_main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-stripes"></div>

    <!-- BACKGROUND STARS -->
    <div class="stars"></div>

    <!-- HEADER -->
    <header class="top-header">
        <div class="logo-container">
            <img src="../assets/NovaVilla.svg" alt="Logo NovaVilla">
        </div>

        <h1 class="header-title">Nova Villa</h1>

        <div class="theme-toggle-container">
            <label class="theme-switch" for="theme-checkbox">
                <input type="checkbox" id="theme-checkbox" aria-label="Basculer entre le thème sombre et clair">
                <span class="slider">
                    <span class="slider-icon sun"><i class="fa-solid fa-sun"></i></span>
                    <span class="slider-icon moon"><i class="fa-solid fa-moon"></i></span>
                </span>
            </label>
        </div>

        <div class="header-curve"></div>

        <nav class="desktop-nav">
            <a href="../main.html" class="nav-link">Accueil</a>
            <a href="./news.html" class="nav-link">News</a>
            <a href="./event.html" class="nav-link active">Événements</a>
            <a href="./partner.html" class="nav-link">Partenaires</a>
        </nav>
        <div class="menu-icon" role="button" tabindex="0" aria-label="Ouvrir le menu de navigation">
            <i class="fa-solid fa-bars fa-2x"></i>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-container events-page-container">
        <div class="events-top-controls">
            <div class="categories-wrapper">
                <div class="button-categories" id="categories-btn" role="button" tabindex="0" aria-label="Filtrer les événements par catégorie" aria-haspopup="listbox">Catégories</div>
                <div class="categories-menu" id="categories-menu">
                    <div class="category-option" data-category="Tous">Tous</div>
                    <div class="category-option" data-category="Sportif">Sportif</div>
                    <div class="category-option" data-category="Concert">Concert</div>
                    <div class="category-option" data-category="Famille">Famille</div>
                    <div class="category-option" data-category="Festival">Festival</div>
                </div>
            </div>

            <section class="action-bar">
                <div class="date-input-container">
                    <button class="arrow-btn-prev" aria-label="Jour précédent"><i class="fa-solid fa-circle-arrow-left"></i></button>
                    <div class="date-display">
                        <span id="date-text">29 Avril 2026</span>
                    </div>
                    <button class="arrow-btn-next" aria-label="Jour suivant"><i class="fa-solid fa-circle-arrow-right"></i></button>
                </div>
                <button class="calendar-btn" aria-label="Ouvrir le calendrier pour choisir une date">
                    <i class="fa-regular fa-calendar"></i>
                </button>
            </section>
        </div>

        <!-- CAROUSEL SECTION -->
        <section class="switcher">
            <div class="switcher-left" id="prev-event" role="button" tabindex="0" aria-label="Événement précédent"><i class="fa-solid fa-chevron-left"></i></div>

            <div class="cards-viewport">
                <div class="cards-container" id="events-container">
                </div>
            </div>

            <div class="switcher-right" id="next-event" role="button" tabindex="0" aria-label="Événement suivant"><i class="fa-solid fa-chevron-right"></i></div>
        </section>

        <!-- GRID HEADER / DIVIDER -->
        <div class="all-events-divider">
            <span class="divider-line"></span>
            <h2>Tous les événements</h2>
            <span class="divider-line"></span>
        </div>

        <!-- ALL EVENTS GRID -->
        <section class="all-events-grid" id="events-grid">
        </section>

    </main>

    <!-- FOOTER / BOTTOM NAV -->
    <footer class="bottom-nav">
        <div class="footer-curved"></div>

        <div class="nav-items-container">
            <a href="../main.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span>Accueil</span>
            </a>
            <a href="./news.html" class="nav-item">
                <i class="fa-solid fa-newspaper"></i>
                <span>News</span>
            </a>
            <a href="./event.html" class="nav-item active">
                <i class="fa-solid fa-star"></i>
                <span>Événements</span>
            </a>
            <a href="./partner.html" class="nav-item">
                <i class="fa-solid fa-handshake"></i>
                <span>Partenaires</span>
            </a>
        </div>
    </footer>

    <!-- Burger Menu Overlay -->
    <div id="burger-menu" class="burger-overlay">
        <div class="menu-content">
            <span class="close-menu" role="button" tabindex="0" aria-label="Fermer le menu de navigation">&times;</span>
            <nav class="menu-nav">
                <a href="../main.html" class="menu-link">Accueil</a>
                <a href="./news.html" class="menu-link">News</a>
                <a href="./event.html" class="menu-link">Événements</a>
                <a href="./partner.html" class="menu-link">Partenaires</a>
            </nav>
        </div>
    </div>

    <!-- Calendar Modal -->
    <div id="calendar-modal" class="calendar-overlay">
        <div class="calendar-container">
            <div class="calendar-header">
                <button id="prev-month" aria-label="Mois précédent"><i class="fa-solid fa-chevron-left"></i></button>
                <h2 id="current-month-year">Avril 2026</h2>
                <button id="next-month" aria-label="Mois suivant"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="calendar-weekdays">
                <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
            </div>
            <div id="calendar-days" class="calendar-days">
            </div>
        </div>
    </div>

    <script src="../js/menu.js"></script>
    <script src="../js/calendar.js"></script>
    <script src="../js/event_page.js"></script>
</body>

</html>
