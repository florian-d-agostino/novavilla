<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VillaNova</title>

    <link rel="stylesheet" href="../sass/style_main.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>




    <!-- ================= HEADER ================= -->
    <header class="top-header">
        <div class="logo-container">
            <img src="../assets/NovaVilla.svg" alt="Logo NovaVilla">
        </div>

        <h1 class="header-title">Nova Villa</h1>

        <div class="header-curve"></div>


        <div class="menu-icon">
            <i class="fa-solid fa-bars fa-2x"></i>
        </div>
    </header>






    <!-- ================= MAIN CONTENT ================= -->
    <main class="main-container">


        <div class="button-categories">Catégories</div>



        <section class="action-bar">
            <div class="input-container">
                <div class="date-input">29 Avril 2026
                    <button class="arrow-btn"><i class="fa-solid fa-circle-arrow-right"></i></button>
                </div>
            </div>
            <button class="calendar-btn">
                <i class="fa-regular fa-calendar"></i>
            </button>
        </section>


        <section class="switcher">
            <div class="switcher-left" id="prev-event"><i class="fa-solid fa-chevron-left"></i></div>

            <div class="cards-viewport">
                <div class="cards-container" id="events-container">


                    <!-- evenement 1 (en attente)-->
                    <div class="main-card">
                        <div class="card-header">Festival des Arts</div>
                        <div class="card-body"></div>
                        <div class="card-footer">
                            127 Boulevard Taschereau, Marseille
                            <div class="button-booking">Reservation</div>
                        </div>
                    </div>


                    <!-- evenement 2 -->
                    <div class="main-card">
                        <div class="card-header">Soirée Jazz</div>
                        <div class="card-body"></div>
                        <div class="card-footer">
                            Vieux Port, Marseille
                            <div class="button-booking">Reservation</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="switcher-right" id="next-event"><i class="fa-solid fa-chevron-right"></i></div>
        </section>



        <div class="title-map">Evénements</div>
        <section class="map-container">

            <div class="map-view" id="map"></div>




            <!-- Popup  (en attente)-->
            <div id="custom-popup" class="map-popup">
                <div class="popup-content">
                    <span class="close-popup">&times;</span>
                    <h3 id="popup-title">Titre de l'activité</h3>
                    <p id="popup-desc">Description de l'activité...</p>
                    <button class="popup-btn">En savoir plus</button>
                </div>
            </div>


            <div class="map-legend">
                <div class="legend-col">
                    <div class="legend-item"><span class="color-box green"></span>
                        <div class="line"></div>Sportif
                    </div>

                    <div class="legend-item"><span class="color-box red"></span>
                        <div class="line"></div>Concert
                    </div>
                </div>


                <div class="legend-col">
                    <div class="legend-item">Famille<div class="line"></div><span class="color-box yellow"></span></div>

                    <div class="legend-item">Festival<div class="line"></div><span class="color-box blue"></span></div>
                </div>
            </div>
        </section>

    </main>







    <!-- ================= FOOTER / BOTTOM NAV ================= -->
    <footer class="bottom-nav">

        <div class="footer-curved"></div>

        <div class="nav-items-container">


            <!-- Item  -->
            <div class="nav-item">
                <div class="nav-bar top-bar"></div>
                <div class="nav-bar bottom-bar"></div>
            </div>

            <div class="nav-item">
                <div class="nav-bar top-bar"></div>
                <div class="nav-bar bottom-bar"></div>
            </div>

            <div class="nav-item">
                <div class="nav-bar top-bar"></div>
                <div class="nav-bar bottom-bar"></div>
            </div>
        </div>
    </footer>




    <!-- Menu Burger Pop-up -->
    <div id="burger-menu" class="burger-overlay">
        <div class="menu-content">
            <span class="close-menu">&times;</span>
            <nav class="menu-nav">
                <a href="#" class="menu-link">Accueil</a>
                <a href="#" class="menu-link">News</a>
                <a href="#" class="menu-link">Événements</a>
                <a href="#" class="menu-link">Partenaires</a>
            </nav>
        </div>
    </div>

    <!-- Scripts Google Maps JS -->
    <script>
        (g => { var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window; b = b[c] || (b[c] = {}); var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => { await (a = m.createElement("script")); e.set("libraries", [...r] + ""); for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]); e.set("callback", c + ".maps." + q); a.src = `https://maps.${c}apis.com/maps/api/js?` + e; d[q] = f; a.onerror = () => h = n(Error(p + " could not load.")); a.nonce = m.querySelector("script[nonce]")?.nonce || ""; m.head.append(a) })); d[l] ? console.warn(p + " only loads once. Re-using existing usage.") : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)) })({
            key: "", // <======= Clé API à mettre ici
            v: "weekly",
        });
    </script>
    <script src="../js/map.js"></script>
    <script src="../js/switcher.js"></script>
    <script src="../js/menu.js"></script>
</body>

</html>
